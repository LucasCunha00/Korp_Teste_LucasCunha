version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: korp
      POSTGRES_PASSWORD: korp123
      POSTGRES_DB: korpdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  estoque:
    build: ./EstoqueService
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=korpdb;Username=korp;Password=korp123
    depends_on:
      - postgres

  faturamento:
    build: ./FaturamentoService
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=korpdb;Username=korp;Password=korp123
      - EstoqueService__BaseUrl=http://estoque:8080
    depends_on:
      - postgres
      - estoque

volumes:
  postgres_data: